<!DOCTYPE html>
<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "brand-primary": "var(--brand-color)",
                        "whatsapp": "#25D366",
                        "background-light": "#f7f7f8",
                        "background-dark": "#1a1c1e",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        :root {--brand-color: #3b82f6; 
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .custom-toggle:checked + .toggle-bg {
            background-color: var(--brand-color);
        }
        .custom-toggle:checked + .toggle-bg .toggle-dot {
            transform: translateX(100%);
        }
        body {
            min-height: 100dvh;
        }.form-input:focus, .form-select:focus {
            outline: none;
            box-shadow: 0 0 0 2px color-mix(in srgb, var(--brand-color), transparent 80%);
            border-color: var(--brand-color);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-[#121617] dark:text-gray-100 min-h-screen flex flex-col">
<header class="sticky top-0 z-50 bg-white/80 dark:bg-background-dark/80 ios-blur border-b border-gray-200 dark:border-gray-800">
<div class="flex items-center justify-between px-4 h-16 max-w-md mx-auto w-full">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
<span class="material-symbols-outlined text-[#121617] dark:text-gray-100">arrow_back_ios_new</span>
</button>
<h1 class="text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">Nueva Cita</h1>
<div class="flex w-10 items-center justify-end">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
<span class="material-symbols-outlined text-[#121617] dark:text-gray-100 text-[24px]">settings</span>
</button>
</div>
</div>
</header>
<main class="flex-1 overflow-y-auto pb-48">
<form class="max-w-md mx-auto space-y-4 p-4">
<section class="bg-white dark:bg-[#252a2f] rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 overflow-hidden">
<h3 class="text-[#121617] dark:text-gray-100 text-sm font-bold leading-tight px-4 pt-4 pb-1 uppercase tracking-wider opacity-60">Personal y Paciente</h3>
<div class="px-4 py-3">
<label class="flex flex-col w-full">
<p class="text-gray-500 dark:text-gray-400 text-xs font-semibold pb-1.5 uppercase tracking-wider">Nombre del Paciente</p>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-[#121617] dark:text-gray-100 border border-[#dce3e5] dark:border-gray-700 bg-white dark:bg-background-dark h-14 placeholder:text-[#658086] px-4 py-3 text-base font-normal transition-all" placeholder="Ej. Juan Pérez" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-4 text-gray-400">person</span>
</div>
</label>
</div>
<div class="px-4 py-3">
<label class="flex flex-col w-full">
<p class="text-gray-500 dark:text-gray-400 text-xs font-semibold pb-1.5 uppercase tracking-wider">Profesional a Cargo</p>
<div class="relative">
<select class="form-select flex w-full appearance-none rounded-xl text-[#121617] dark:text-gray-100 border border-[#dce3e5] dark:border-gray-700 bg-white dark:bg-background-dark h-14 px-4 py-3 text-base font-normal transition-all">
<option disabled="" selected="" value="">Seleccionar Profesional</option>
<option value="1">Dr. Alejandro Rossi</option>
<option value="2">Dra. Martina Soto</option>
<option value="3">Lic. Carlos Méndez</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-4 text-gray-400 pointer-events-none">medical_services</span>
</div>
</label>
</div>
<div class="h-2"></div>
</section>
<section class="bg-white dark:bg-[#252a2f] rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 overflow-hidden">
<h3 class="text-[#121617] dark:text-gray-100 text-sm font-bold leading-tight px-4 pt-4 pb-1 uppercase tracking-wider opacity-60">Detalles del Servicio</h3>
<div class="px-4 py-3">
<label class="flex flex-col w-full">
<p class="text-gray-500 dark:text-gray-400 text-xs font-semibold pb-1.5 uppercase tracking-wider">Tratamiento</p>
<div class="relative">
<select class="form-select flex w-full appearance-none rounded-xl text-[#121617] dark:text-gray-100 border border-[#dce3e5] dark:border-gray-700 bg-white dark:bg-background-dark h-14 px-4 py-3 text-base font-normal transition-all">
<option disabled="" selected="" value="">Tipo de servicio</option>
<option value="general">Consulta General</option>
<option value="specialist">Visita Especialista</option>
<option value="therapy">Fisioterapia</option>
<option value="lab">Análisis de Laboratorio</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-4 text-gray-400 pointer-events-none">content_paste</span>
</div>
</label>
</div>
<div class="px-4 py-3">
<p class="text-gray-500 dark:text-gray-400 text-xs font-semibold pb-1.5 uppercase tracking-wider">Fecha y Hora</p>
<div class="flex gap-3">
<div class="relative flex-[1.4]">
<input class="form-input flex w-full rounded-xl text-[#121617] dark:text-gray-100 border border-[#dce3e5] dark:border-gray-700 bg-white dark:bg-background-dark h-14 px-4 py-3 text-base font-normal transition-all" type="date"/>
<span class="material-symbols-outlined absolute right-4 top-4 text-gray-400 pointer-events-none">calendar_today</span>
</div>
<div class="relative flex-1">
<input class="form-input flex w-full rounded-xl text-[#121617] dark:text-gray-100 border border-[#dce3e5] dark:border-gray-700 bg-white dark:bg-background-dark h-14 px-4 py-3 text-base font-normal transition-all" type="time"/>
<span class="material-symbols-outlined absolute right-4 top-4 text-gray-400 pointer-events-none">schedule</span>
</div>
</div>
</div>
<div class="h-2"></div>
</section>
<section class="bg-white dark:bg-[#252a2f] rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 overflow-hidden">
<h3 class="text-[#121617] dark:text-gray-100 text-sm font-bold leading-tight px-4 pt-4 pb-1 uppercase tracking-wider opacity-60">Pagos</h3>
<div class="px-4 py-3 grid grid-cols-2 gap-3">
<label class="flex flex-col w-full">
<p class="text-gray-500 dark:text-gray-400 text-xs font-semibold pb-1.5 uppercase tracking-wider">Precio Total</p>
<div class="relative">
<span class="absolute left-4 top-[17px] text-gray-500 font-medium">$</span>
<input class="form-input flex w-full rounded-xl text-[#121617] dark:text-gray-100 border border-[#dce3e5] dark:border-gray-700 bg-white dark:bg-background-dark h-14 pl-8 pr-4 py-3 text-base font-medium" placeholder="0.00" step="0.01" type="number"/>
</div>
</label>
<label class="flex flex-col w-full">
<p class="text-gray-500 dark:text-gray-400 text-xs font-semibold pb-1.5 uppercase tracking-wider">Seña/Depósito</p>
<div class="relative">
<span class="absolute left-4 top-[17px] text-gray-500 font-medium">$</span>
<input class="form-input flex w-full rounded-xl text-[#121617] dark:text-gray-100 border border-[#dce3e5] dark:border-gray-700 bg-white dark:bg-background-dark h-14 pl-8 pr-4 py-3 text-base font-medium" placeholder="0.00" step="0.01" type="number"/>
</div>
</label>
</div>
<div class="flex items-center justify-between py-3 px-5 border-t border-gray-50 dark:border-gray-800/50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-gray-400">payments</span>
<div>
<p class="text-[#121617] dark:text-gray-100 text-[15px] font-semibold">¿Seña pagada?</p>
<p class="text-gray-500 dark:text-gray-400 text-[11px] font-medium uppercase tracking-tight">Confirmar recepción</p>
</div>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer custom-toggle" type="checkbox"/>
<div class="w-12 h-6.5 bg-gray-200 peer-focus:outline-none dark:bg-gray-700 rounded-full after:content-[''] after:absolute after:top-[4px] after:start-[4px] after:bg-white after:rounded-full after:h-5.5 after:w-5.5 after:transition-all peer-checked:bg-[var(--brand-color)] after:shadow-sm peer-checked:after:translate-x-5.5"></div>
</label>
</div>
</section>
<section class="bg-white dark:bg-[#252a2f] rounded-2xl shadow-sm border border-gray-100 dark:border-gray-800 overflow-hidden">
<div class="p-4">
<button class="w-full flex items-center justify-between group" type="button">
<div class="flex items-center gap-3">
<div class="size-10 bg-whatsapp/10 rounded-full flex items-center justify-center">
<svg class="w-5 h-5 fill-whatsapp" viewBox="0 0 24 24">
<path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766 0-3.18-2.587-5.771-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.747-2.874-2.512-2.96-2.626-.087-.115-.708-.941-.708-1.795 0-.855.448-1.274.607-1.441.159-.166.347-.209.462-.209s.231.001.332.005c.101.005.255-.038.398.305.144.344.491 1.199.534 1.285.044.086.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86.174.088.275.073.376-.044.101-.117.434-.506.549-.68.116-.174.232-.145.391-.087s1.011.477 1.184.564c.174.087.289.129.332.202.043.073.043.423-.101.827z"></path>
</svg>
</div>
<div class="text-left">
<p class="text-[#121617] dark:text-gray-100 text-sm font-bold">Configuración de WhatsApp</p>
<p class="text-gray-500 dark:text-gray-400 text-xs">Personalizar mensaje automático</p>
</div>
</div>
<span class="material-symbols-outlined text-gray-400 group-hover:text-gray-600 transition-colors">chevron_right</span>
</button>
</div>
</section>
</form>
</main>
<footer class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 dark:bg-background-dark/80 ios-blur border-t border-gray-200 dark:border-gray-800 safe-area-bottom z-50">
<div class="max-w-md mx-auto space-y-2.5">
<button class="w-full bg-[var(--brand-color)] hover:brightness-110 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-500/10 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
<span class="material-symbols-outlined text-[20px]">check_circle</span>
            Confirmar Cita
        </button>
<button class="w-full bg-[#25D366] hover:brightness-105 text-white font-bold py-4 rounded-xl shadow-lg shadow-whatsapp/10 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="button">
<svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
<path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766 0-3.18-2.587-5.771-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.747-2.874-2.512-2.96-2.626-.087-.115-.708-.941-.708-1.795 0-.855.448-1.274.607-1.441.159-.166.347-.209.462-.209s.231.001.332.005c.101.005.255-.038.398.305.144.344.491 1.199.534 1.285.044.086.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86.174.088.275.073.376-.044.101-.117.434-.506.549-.68.116-.174.232-.145.391-.087s1.011.477 1.184.564c.174.087.289.129.332.202.043.073.043.423-.101.827z"></path>
<path d="M12.094 2c-5.468 0-9.911 4.442-9.914 9.919 0 2.057.629 4.043 1.83 5.711L3 22l4.522-1.185c1.604.876 3.414 1.337 5.26 1.338l.005-.001c5.468 0 9.91-4.444 9.914-9.919.002-5.476-4.437-9.233-9.607-10.233zM12.094 19.859h-.005c-1.636-.001-3.241-.441-4.639-1.273l-.333-.199-2.684.703.716-2.617-.219-.348c-.911-1.45-1.393-3.125-1.393-4.853.003-4.945 4.026-8.966 8.974-8.966 4.948 0 8.968 4.022 8.97 8.967-.003 4.946-4.024 8.967-8.97 8.967z"></path>
</svg>
            Enviar recordatorio por WhatsApp
        </button>
</div>
</footer>

</body></html>
