<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#288a72",
              "background-light": "#f6f8f7",
              "background-dark": "#131f1c",
              "wellness-peach": "#F1B989",
              "wellness-blue": "#A5CEDC",
              "card-warm": "#F7F5F2"
            },
            fontFamily: {
              "display": ["Manrope", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .illustration-container {
            background: linear-gradient(135deg, rgba(165, 206, 220, 0.2) 0%, rgba(241, 185, 137, 0.15) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col font-display transition-colors duration-300">
<!-- Top Navigation -->
<header class="flex items-center justify-end p-6">
<button class="text-primary font-bold text-sm tracking-wide uppercase px-2 py-1">
            Saltar
        </button>
</header>
<!-- Main Onboarding Content -->
<main class="flex-1 flex flex-col items-center justify-center px-6">
<!-- Step Container (Card Style) -->
<div class="w-full max-w-sm bg-white dark:bg-zinc-900 rounded-xl shadow-sm border border-black/5 dark:border-white/5 overflow-hidden flex flex-col">
<!-- Illustration Area -->
<div class="illustration-container aspect-square w-full flex items-center justify-center relative p-12">
<!-- Abstract Wellness Illustration representation -->
<div class="relative w-full h-full flex items-center justify-center">
<div class="absolute inset-0 bg-wellness-peach/20 rounded-full blur-3xl"></div>
<div class="w-48 h-48 bg-white dark:bg-zinc-800 rounded-full shadow-xl flex items-center justify-center relative overflow-hidden">
<!-- Simplified representation of Pillar 1: Agenda -->
<div class="grid grid-cols-3 gap-2 p-6 w-full">
<div class="h-8 bg-primary/20 rounded-sm"></div>
<div class="h-8 bg-wellness-blue/30 rounded-sm"></div>
<div class="h-8 bg-primary/20 rounded-sm"></div>
<div class="h-8 bg-wellness-blue/30 rounded-sm"></div>
<div class="h-8 bg-primary rounded-sm shadow-md"></div>
<div class="h-8 bg-primary/20 rounded-sm"></div>
</div>
</div>
</div>
<!-- Data Alt for Illustration -->
<div class="hidden" data-alt="Abstract illustration of a wellness calendar with soft geometric shapes"></div>
</div>
<!-- Text Content -->
<div class="p-8 text-center">
<h1 class="text-zinc-900 dark:text-zinc-100 text-2xl font-extrabold leading-tight mb-4">
                    Gestiona tu Agenda
                </h1>
<p class="text-zinc-600 dark:text-zinc-400 text-base leading-relaxed">
                    Toma el control de tu tiempo de forma intuitiva y organiza tus sesiones sin esfuerzo.
                </p>
</div>
</div>
<!-- Pagination Indicators -->
<div class="flex items-center gap-2.5 py-10">
<div class="h-2.5 w-6 rounded-full bg-primary transition-all"></div>
<div class="h-2.5 w-2.5 rounded-full bg-zinc-300 dark:bg-zinc-700"></div>
<div class="h-2.5 w-2.5 rounded-full bg-zinc-300 dark:bg-zinc-700"></div>
</div>
</main>
<!-- Footer Action -->
<footer class="p-8 pt-0 w-full max-w-sm mx-auto">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group">
            Siguiente
            <span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
<!-- Subtle Secondary Button (Comenzar is for final step) -->
<p class="text-center mt-6 text-zinc-400 dark:text-zinc-500 text-xs font-medium uppercase tracking-[0.1em]">
            Paso 1 de 3
        </p>
</footer>
<!-- Image for Context (Internal reference) -->
<div class="hidden">
<img data-alt="Soft morning light in a minimalist therapy room" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDJjJQZrEHpmw8RZWV-Usfn49R0NtUcUlEjcrab-YcqOw8gni7Zp539DUiC9nsqhOXMpQREYwjxtavNVjXOzkpnb5E9FE1UqtFDGfSFpq0UWWDglarRfdiflvjLTjeoRz18lG0sTTk-z349B-5jV_Tuvnha09VyPMufQOI5p-bBfkOq_D0BOmlgZP1zUL2HnAHkLjPCqORTwy6TjSLoamlIQKvHlwFPdv38coLonmjQmryuRN66HMykpotJ20Ww5XkiYrMNslCJobob"/>
</div>
</body></html>
