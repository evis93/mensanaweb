<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b8bab",
                        "background-light": "#ffffff",
                        "background-dark": "#121212",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-[#121617] antialiased">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- Top App Bar (iOS Style) -->
<header class="flex items-center bg-background-light dark:bg-background-dark px-4 py-4 justify-between sticky top-0 z-10">
<div class="text-[#121617] dark:text-white flex size-10 items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors cursor-pointer">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</div>
<h2 class="text-[#121617] dark:text-white text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10">Acceso para Profesionales</h2>
</header>
<main class="flex-1 flex flex-col px-6 pb-12">
<!-- Clinic Logo Area (White Label Placeholder) -->
<div class="mt-8 mb-12 flex justify-center">
<div class="w-full max-w-[200px] aspect-[3/1] bg-gray-50 dark:bg-gray-800 rounded-xl flex items-center justify-center border border-dashed border-gray-300 dark:border-gray-700 overflow-hidden" data-alt="Placeholder for clinic or corporate logo" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuB1k3TBhfffSeYIg_xsI4KTbCswgJnM7qERsTsHuPwNEZI-DFk4ww-j7P9a2_v35BsIEc68O_hHM_odcnjDOohmU1ESjKQ3S0iz3UQ4HydkrzGkI09bXu95jLcD96m06CPLUK73TecDwmOuNU2L6uYlGiCWl4YtKLc62pDyDkdx8j6Hbb3Vv0BNz9k2RdDvweBBkRJSKXYPxVfwGAw0zK0pt1xQsLtp7A2puNiuz_WRU7tue3HEqpHIWUDRDMuNBeRy818gZTaD8I_m'); background-size: contain; background-repeat: no-repeat; background-position: center;">
<!-- Logo image would go here -->
</div>
</div>
<!-- Login Form -->
<div class="flex flex-col gap-6 w-full max-w-md mx-auto">
<!-- Welcome Text -->
<div class="flex flex-col gap-1 mb-2">
<h1 class="text-2xl font-bold dark:text-white">Bienvenido de nuevo</h1>
<p class="text-[#677c83] text-sm">Ingrese sus credenciales para acceder al consultorio.</p>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="flex flex-col w-full">
<p class="text-[#121617] dark:text-gray-200 text-sm font-semibold pb-1.5 px-1">Correo electrónico</p>
<input class="form-input flex w-full rounded-lg text-[#121617] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-[#dde2e4] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary h-14 placeholder:text-[#677c83] px-4 text-base font-normal transition-all" placeholder="nombre@clinica.com" type="email"/>
</label>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="flex flex-col w-full">
<div class="flex justify-between items-end pb-1.5 px-1">
<p class="text-[#121617] dark:text-gray-200 text-sm font-semibold">Contraseña</p>
</div>
<div class="relative flex items-center">
<input class="form-input flex w-full rounded-lg text-[#121617] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-[#dde2e4] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary h-14 placeholder:text-[#677c83] pl-4 pr-12 text-base font-normal transition-all" placeholder="••••••••" type="password"/>
<div class="absolute right-4 text-[#677c83] cursor-pointer hover:text-primary transition-colors">
<span class="material-symbols-outlined">visibility</span>
</div>
</div>
</label>
</div>
<!-- Forgot Password -->
<div class="flex justify-center py-2">
<a class="text-primary text-sm font-semibold hover:underline decoration-2 underline-offset-4" href="#">
                        ¿Olvidaste tu contraseña?
                    </a>
</div>
<!-- Submit Button -->
<div class="mt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-primary/20 active:scale-[0.98]">
                        Iniciar Sesión
                    </button>
</div>
<!-- Security Assurance -->
<div class="mt-8 flex items-center justify-center gap-2 text-[#677c83]">
<span class="material-symbols-outlined text-sm">lock</span>
<p class="text-xs font-medium uppercase tracking-widest">Conexión Segura Encriptada</p>
</div>
</div>
</main>
<!-- Footer / Support -->
<footer class="mt-auto p-6 text-center">
<p class="text-[#677c83] text-xs">
                ¿Necesitas ayuda? <a class="text-primary font-bold" href="#">Contactar soporte</a>
</p>
<div class="h-8"></div> <!-- Safe area spacing -->
</footer>
</div>
</body></html>
