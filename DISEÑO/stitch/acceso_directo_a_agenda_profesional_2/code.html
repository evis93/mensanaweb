<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#2f8e8a",
              "background-light": "#f5f5f4",
              "background-dark": "#16181d",
            },
            fontFamily: {
              "display": ["Manrope", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      body {
        font-family: 'Manrope', sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen">
<div class="relative flex h-full min-h-screen w-full flex-col overflow-x-hidden">
<!-- TopAppBar -->
<div class="flex items-center bg-transparent p-4 pb-2 justify-between">
<div class="text-[#121616] dark:text-white flex size-12 shrink-0 items-center justify-center rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors cursor-pointer">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</div>
<h2 class="text-[#121616] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-12">Mensana</h2>
</div>
<div class="flex flex-col items-center justify-center flex-1 px-4 py-8">
<!-- Professional Icon / Visual Element -->
<div class="mb-6 flex h-20 w-20 items-center justify-center rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined !text-4xl">medical_services</span>
</div>
<!-- HeadlineText -->
<h2 class="text-[#121616] dark:text-white tracking-light text-[28px] font-bold leading-tight px-4 text-center pb-2">Acceso Directo a Agenda Profesional</h2>
<!-- BodyText -->
<p class="text-[#4a5568] dark:text-gray-400 text-base font-normal leading-normal pb-8 pt-1 px-8 text-center max-w-sm">
                Inicia sesión para gestionar tus citas y pacientes de forma segura.
            </p>
<!-- Login Card -->
<div class="w-full max-w-[440px] bg-white dark:bg-gray-900 rounded-xl shadow-xl shadow-primary/5 p-6 border border-primary/5">
<!-- TextField: Usuario -->
<div class="flex flex-col w-full gap-2 mb-4">
<p class="text-[#121616] dark:text-gray-200 text-sm font-semibold leading-normal px-1">Usuario</p>
<div class="flex w-full items-stretch rounded-xl group">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#121616] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-[#dde3e3] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary h-14 placeholder:text-[#6a8180] p-[15px] rounded-r-none border-r-0 pr-2 text-base font-normal leading-normal transition-all" placeholder="Introduce tu usuario" value=""/>
<div class="text-[#6a8180] flex border border-[#dde3e3] dark:border-gray-700 bg-white dark:bg-gray-800 items-center justify-center pr-[15px] rounded-r-xl border-l-0 group-focus-within:border-primary transition-all">
<span class="material-symbols-outlined">person</span>
</div>
</div>
</div>
<!-- TextField: Contraseña -->
<div class="flex flex-col w-full gap-2 mb-6">
<p class="text-[#121616] dark:text-gray-200 text-sm font-semibold leading-normal px-1">Contraseña</p>
<div class="flex w-full items-stretch rounded-xl group">
<input class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-xl text-[#121616] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-[#dde3e3] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary h-14 placeholder:text-[#6a8180] p-[15px] rounded-r-none border-r-0 pr-2 text-base font-normal leading-normal transition-all" placeholder="••••••••" type="password" value=""/>
<div class="text-[#6a8180] flex border border-[#dde3e3] dark:border-gray-700 bg-white dark:bg-gray-800 items-center justify-center pr-[15px] rounded-r-xl border-l-0 group-focus-within:border-primary transition-all">
<span class="material-symbols-outlined">visibility</span>
</div>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white rounded-xl font-bold text-lg transition-all active:scale-[0.98] shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
<span class="material-symbols-outlined">calendar_today</span>
                    Acceder a mi Agenda
                </button>
<!-- Forgot Password -->
<div class="w-full text-center mt-4">
<button class="text-primary text-sm font-medium hover:underline">¿Olvidaste tu contraseña?</button>
</div>
</div>
<!-- Secondary Switcher -->
<div class="mt-12 flex flex-col items-center gap-4">
<div class="h-[1px] w-24 bg-primary/20"></div>
<button class="flex items-center gap-2 px-6 py-3 rounded-full border border-primary/30 text-primary font-semibold text-sm bg-primary/5 hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined !text-lg">person_search</span>
                    Cambiar a modo Consultante
                </button>
</div>
</div>
<!-- Decorative elements for wellness feel -->
<div class="fixed top-0 right-0 -z-10 opacity-30 pointer-events-none">
<div class="w-[300px] h-[300px] bg-primary/20 rounded-full blur-[80px]"></div>
</div>
<div class="fixed bottom-0 left-0 -z-10 opacity-20 pointer-events-none">
<div class="w-[400px] h-[400px] bg-primary/30 rounded-full blur-[100px]"></div>
</div>
<div class="h-10"></div>
</div>
</body></html>
