<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>registro usuario: datos básicos</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b8cee",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .mensana-gradient {
            background: linear-gradient(135deg, #2b8cee 0%, #a2d2ff 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen font-display transition-colors duration-300">
<div class="max-w-[480px] mx-auto min-h-screen bg-white dark:bg-background-dark shadow-sm flex flex-col">
<!-- Subtle Progress Bar -->
<div class="flex flex-col gap-1 p-4 pt-6">
<div class="flex justify-between items-center mb-1">
<p class="text-[#617589] dark:text-gray-400 text-xs font-medium lowercase">paso 1 de 3: datos básicos</p>
<span class="material-symbols-outlined text-gray-400 text-sm">lock</span>
</div>
<div class="h-1.5 w-full bg-[#dbe0e6] dark:bg-gray-800 rounded-full overflow-hidden">
<div class="mensana-gradient h-full rounded-full" style="width: 33%;"></div>
</div>
</div>
<!-- Logo/Header -->
<div class="flex flex-col items-center pt-8 pb-4">
<div class="flex items-center gap-2 mb-2">
<div class="w-8 h-8 mensana-gradient rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl">psychology</span>
</div>
<h2 class="text-[#111418] dark:text-white text-2xl font-extrabold tracking-tight lowercase">mensana</h2>
</div>
</div>
<!-- Headline & Subtext -->
<div class="px-6 text-center">
<h1 class="text-[#111418] dark:text-white tracking-tight text-3xl font-bold leading-tight pb-2 lowercase">crea tu cuenta</h1>
<p class="text-[#617589] dark:text-gray-400 text-base font-normal leading-normal px-4 lowercase">ingresa tus datos para comenzar tu camino de bienestar</p>
</div>
<!-- Form Fields -->
<div class="flex-1 px-6 py-8 flex flex-col gap-5">
<!-- Name Field -->
<div class="flex flex-col gap-2">
<label class="flex flex-col w-full">
<p class="text-[#111418] dark:text-gray-200 text-sm font-semibold leading-normal pb-1 ml-1 lowercase">nombre y apellido</p>
<input class="form-input flex w-full rounded-xl text-[#111418] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-[#dbe0e6] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary h-14 placeholder:text-[#617589] dark:placeholder:text-gray-500 p-4 text-base font-normal lowercase" placeholder="ej: juan pérez" type="text"/>
</label>
</div>
<!-- Email Field -->
<div class="flex flex-col gap-2">
<label class="flex flex-col w-full">
<p class="text-[#111418] dark:text-gray-200 text-sm font-semibold leading-normal pb-1 ml-1 lowercase">correo electrónico</p>
<input class="form-input flex w-full rounded-xl text-[#111418] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-[#dbe0e6] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary h-14 placeholder:text-[#617589] dark:placeholder:text-gray-500 p-4 text-base font-normal lowercase" placeholder="ej: hola@ejemplo.com" type="email"/>
</label>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-2">
<label class="flex flex-col w-full relative">
<p class="text-[#111418] dark:text-gray-200 text-sm font-semibold leading-normal pb-1 ml-1 lowercase">crear contraseña</p>
<div class="relative">
<input class="form-input flex w-full rounded-xl text-[#111418] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/20 border border-[#dbe0e6] dark:border-gray-700 bg-white dark:bg-gray-800 focus:border-primary h-14 placeholder:text-[#617589] dark:placeholder:text-gray-500 p-4 text-base font-normal lowercase" placeholder="mínimo 8 caracteres" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-[#617589]">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</label>
</div>
<div class="flex items-start gap-3 px-1 mt-2">
<div class="mt-1">
<span class="material-symbols-outlined text-primary text-sm">verified_user</span>
</div>
<p class="text-xs text-[#617589] dark:text-gray-400 leading-tight lowercase">tus datos están protegidos y son cifrados de extremo a extremo para tu seguridad.</p>
</div>
</div>
<!-- Actions -->
<div class="px-6 pb-12 flex flex-col gap-4">
<button class="w-full mensana-gradient text-white h-14 rounded-xl font-bold text-lg shadow-md active:scale-[0.98] transition-transform lowercase">
                continuar
            </button>
<div class="flex flex-col items-center gap-2">
<p class="text-sm text-[#617589] dark:text-gray-400 lowercase">
                    ¿ya tienes cuenta? 
                    <a class="text-primary font-bold hover:underline ml-1" href="#">iniciar sesión</a>
</p>
</div>
</div>
<!-- Optional Decorative Element -->
<div class="h-1 mensana-gradient w-full opacity-20"></div>
</div>
</body></html>
