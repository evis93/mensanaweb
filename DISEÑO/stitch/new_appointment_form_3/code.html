<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@400&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1f96ad",
                        "background-light": "#f7f7f8",
                        "background-dark": "#1a1c1e",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .custom-toggle:checked + .toggle-bg {
            background-color: #1f96ad;
        }
        .custom-toggle:checked + .toggle-bg .toggle-dot {
            transform: translateX(100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-[#121617] dark:text-gray-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-50 bg-white/80 dark:bg-background-dark/80 ios-blur border-b border-gray-200 dark:border-gray-800">
<div class="flex items-center justify-between px-4 h-16">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
<span class="material-symbols-outlined text-[#121617] dark:text-gray-100">arrow_back_ios_new</span>
</button>
<h1 class="text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center">New Appointment</h1>
<div class="flex w-10 items-center justify-end">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
<span class="material-symbols-outlined text-[#121617] dark:text-gray-100">more_horiz</span>
</button>
</div>
</div>
</header>
<main class="flex-1 overflow-y-auto pb-32">
<form class="max-w-md mx-auto space-y-6 p-4">
<!-- Section: Patient Details -->
<section class="bg-white dark:bg-[#252a2f] rounded-xl shadow-sm border border-gray-100 dark:border-gray-800 overflow-hidden">
<h3 class="text-[#121617] dark:text-gray-100 text-base font-bold leading-tight px-4 pt-5 pb-2">Patient Details</h3>
<div class="px-4 py-3">
<label class="flex flex-col w-full">
<p class="text-gray-500 dark:text-gray-400 text-sm font-medium pb-2 uppercase tracking-wider">Full Name</p>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-[#121617] dark:text-gray-100 focus:ring-2 focus:ring-primary/20 border border-[#dce3e5] dark:border-gray-700 bg-white dark:bg-background-dark focus:border-primary h-14 placeholder:text-[#658086] px-4 py-3 text-base font-normal transition-all" placeholder="Search or enter name" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-4 text-gray-400">person_search</span>
</div>
</label>
</div>
<div class="h-4"></div>
</section>
<!-- Section: Appointment Info -->
<section class="bg-white dark:bg-[#252a2f] rounded-xl shadow-sm border border-gray-100 dark:border-gray-800 overflow-hidden">
<h3 class="text-[#121617] dark:text-gray-100 text-base font-bold leading-tight px-4 pt-5 pb-2">Appointment Info</h3>
<!-- Service Dropdown -->
<div class="px-4 py-3">
<label class="flex flex-col w-full">
<p class="text-gray-500 dark:text-gray-400 text-sm font-medium pb-2 uppercase tracking-wider">Service / Treatment</p>
<div class="relative">
<select class="form-input flex w-full appearance-none rounded-lg text-[#121617] dark:text-gray-100 focus:ring-2 focus:ring-primary/20 border border-[#dce3e5] dark:border-gray-700 bg-white dark:bg-background-dark focus:border-primary h-14 px-4 py-3 text-base font-normal transition-all">
<option disabled="" selected="" value="">Select a service</option>
<option value="general">General Consultation</option>
<option value="specialist">Specialist Visit</option>
<option value="therapy">Physical Therapy</option>
<option value="lab">Laboratory Test</option>
</select>
<span class="material-symbols-outlined absolute right-4 top-4 text-gray-400 pointer-events-none">expand_more</span>
</div>
</label>
</div>
<!-- Date & Time Row -->
<div class="flex gap-4 px-4 py-3">
<label class="flex flex-col flex-1">
<p class="text-gray-500 dark:text-gray-400 text-sm font-medium pb-2 uppercase tracking-wider">Date</p>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-[#121617] dark:text-gray-100 focus:ring-2 focus:ring-primary/20 border border-[#dce3e5] dark:border-gray-700 bg-white dark:bg-background-dark focus:border-primary h-14 px-4 py-3 text-base font-normal transition-all" type="date"/>
<span class="material-symbols-outlined absolute right-4 top-4 text-gray-400 pointer-events-none">calendar_today</span>
</div>
</label>
<label class="flex flex-col flex-1">
<p class="text-gray-500 dark:text-gray-400 text-sm font-medium pb-2 uppercase tracking-wider">Time</p>
<div class="relative">
<input class="form-input flex w-full rounded-lg text-[#121617] dark:text-gray-100 focus:ring-2 focus:ring-primary/20 border border-[#dce3e5] dark:border-gray-700 bg-white dark:bg-background-dark focus:border-primary h-14 px-4 py-3 text-base font-normal transition-all" type="time"/>
<span class="material-symbols-outlined absolute right-4 top-4 text-gray-400 pointer-events-none">schedule</span>
</div>
</label>
</div>
<div class="h-4"></div>
</section>
<!-- Section: Billing -->
<section class="bg-white dark:bg-[#252a2f] rounded-xl shadow-sm border border-gray-100 dark:border-gray-800 overflow-hidden">
<h3 class="text-[#121617] dark:text-gray-100 text-base font-bold leading-tight px-4 pt-5 pb-2">Billing &amp; Payment</h3>
<div class="px-4 py-3 space-y-4">
<!-- Total Price -->
<label class="flex flex-col w-full">
<p class="text-gray-500 dark:text-gray-400 text-sm font-medium pb-2 uppercase tracking-wider">Total Price</p>
<div class="relative">
<span class="absolute left-4 top-4 text-gray-500">$</span>
<input class="form-input flex w-full rounded-lg text-[#121617] dark:text-gray-100 focus:ring-2 focus:ring-primary/20 border border-[#dce3e5] dark:border-gray-700 bg-white dark:bg-background-dark focus:border-primary h-14 pl-8 pr-4 py-3 text-base font-normal" placeholder="0.00" step="0.01" type="number"/>
</div>
</label>
<!-- Deposit (Seña) -->
<label class="flex flex-col w-full">
<p class="text-gray-500 dark:text-gray-400 text-sm font-medium pb-2 uppercase tracking-wider">Deposit (Seña)</p>
<div class="relative">
<span class="absolute left-4 top-4 text-gray-500">$</span>
<input class="form-input flex w-full rounded-lg text-[#121617] dark:text-gray-100 focus:ring-2 focus:ring-primary/20 border border-[#dce3e5] dark:border-gray-700 bg-white dark:bg-background-dark focus:border-primary h-14 pl-8 pr-4 py-3 text-base font-normal" placeholder="0.00" step="0.01" type="number"/>
</div>
</label>
<!-- Payment Toggle -->
<div class="flex items-center justify-between py-2 px-1">
<div>
<p class="text-[#121617] dark:text-gray-100 text-base font-medium">Deposit Paid</p>
<p class="text-gray-500 dark:text-gray-400 text-xs">Mark as received from patient</p>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer custom-toggle" type="checkbox" value=""/>
<div class="w-14 h-8 bg-gray-200 peer-focus:outline-none dark:bg-gray-700 rounded-full peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[4px] after:start-[4px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-6 after:w-6 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
</div>
<div class="h-4"></div>
</section>
</form>
</main>
<!-- Fixed Footer Action -->
<footer class="fixed bottom-0 left-0 right-0 p-4 bg-white/80 dark:bg-background-dark/80 ios-blur border-t border-gray-200 dark:border-gray-800 safe-area-bottom">
<div class="max-w-md mx-auto">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined">check_circle</span>
                Confirm Appointment
            </button>
<!-- iPhone Home Indicator Spacer -->
<div class="h-4"></div>
</div>
</footer>
</body></html>
