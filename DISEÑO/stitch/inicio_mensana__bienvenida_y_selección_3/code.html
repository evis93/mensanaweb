<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Inicio Mensana - Bienvenida</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#26736c",
                        "background-light": "#f2f4f1",
                        "background-dark": "#161b1d",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .dark .glass-card {
            background: rgba(22, 27, 29, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-[#121616] dark:text-white min-h-screen transition-colors duration-300">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<!-- TopAppBar -->
<header class="flex items-center bg-transparent p-6 justify-between z-10">
<div class="flex size-10 shrink-0 items-center justify-center rounded-full bg-primary/10 text-primary">
<span class="material-symbols-outlined text-[28px]">spa</span>
</div>
<h2 class="text-primary dark:text-white text-xl font-extrabold leading-tight tracking-tight flex-1 text-center pr-10 uppercase tracking-widest">
                Mensana
            </h2>
</header>
<main class="flex-1 flex flex-col px-6 pb-12">
<!-- Header Image / Hero Area -->
<div class="mt-4 mb-8 relative">
<div class="w-full aspect-[4/3] bg-primary/5 rounded-3xl overflow-hidden relative">
<!-- Abstract Background for Visual Interest -->
<div class="absolute inset-0 opacity-40 bg-[radial-gradient(circle_at_50%_120%,#26736c_0%,transparent_70%)]"></div>
<div class="w-full h-full bg-center bg-no-repeat bg-cover flex flex-col justify-end p-8" data-alt="Calm abstract nature pattern with soft greens" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBbzXpRlCcA26ylDZVQ-B8lASzn54gQGM60G8GLqgg51oNNzhYCSA0-EiohaYTLXDE26zpLpOc9pWOxc0KsBLTb2cDXlMvpPvl273bC21ZDWbDpqJHtoxanNqkxGKbMCfr5pyEUVV5P9wEx-a4N9mOqfWRXl7lpF43nCX-2RDr2HRxePDUpHsJBIzCzAsn4FDQV2zPLK303Ygs2bsPeQ6Kco5AqCmD_v8YayzF88NH5ihaVqc9NIAp8oArnNP3FGOzQQAL5CarCuoY3"); mix-blend-mode: luminosity;'>
<div class="glass-card p-4 rounded-2xl">
<h1 class="text-2xl font-bold text-primary dark:text-white leading-tight">
                                Tu camino hacia el bienestar integral comienza aquí.
                            </h1>
</div>
</div>
</div>
</div>
<!-- Headline Text -->
<div class="text-center mb-10">
<h2 class="text-3xl font-extrabold tracking-tight mb-3">Bienvenido a Mensana</h2>
<p class="text-gray-600 dark:text-gray-400 text-base leading-relaxed max-w-[280px] mx-auto">
                    Elegí cómo querés interactuar con nuestra comunidad.
                </p>
</div>
<!-- Selection Options (Button Group replacement with Cards for iOS feel) -->
<div class="flex flex-col gap-4 max-w-[480px] mx-auto w-full mb-10">
<!-- Option 1: Searcher -->
<button class="group flex flex-col items-center justify-center p-6 rounded-3xl bg-primary text-white shadow-xl shadow-primary/20 active:scale-95 transition-all duration-200 text-center">
<div class="bg-white/20 p-3 rounded-full mb-3 group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl">favorite</span>
</div>
<span class="text-lg font-bold">Buscá tu bienestar</span>
<span class="text-sm opacity-80 mt-1 font-normal">Encontrá profesionales y espacios</span>
</button>
<!-- Option 2: Professional -->
<button class="group flex flex-col items-center justify-center p-6 rounded-3xl bg-white dark:bg-zinc-800 text-[#121616] dark:text-white shadow-lg border border-gray-100 dark:border-zinc-700 active:scale-95 transition-all duration-200 text-center">
<div class="bg-primary/10 p-3 rounded-full mb-3 text-primary group-hover:scale-110 transition-transform">
<span class="material-symbols-outlined text-3xl">business_center</span>
</div>
<span class="text-lg font-bold">Soy Profesional / Espacio</span>
<span class="text-sm text-gray-500 dark:text-gray-400 mt-1 font-normal">Gestioná tu agenda y pacientes</span>
</button>
</div>
<!-- Body Text / Inspirational Message -->
<footer class="mt-auto pt-6 border-t border-gray-200 dark:border-zinc-800">
<p class="text-gray-500 dark:text-gray-400 text-sm font-medium leading-relaxed text-center px-4 italic">
                    "Unite a una comunidad dedicada a tu equilibrio y salud mental."
                </p>
</footer>
</main>
<!-- Bottom Safe Area Indicator (Visual only) -->
<div class="h-8 w-full bg-transparent"></div>
</div>
</body></html>
