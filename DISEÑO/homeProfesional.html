<!DOCTYPE html>
<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reporte de Caja Mensual</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1f96ad",
                        "accent": "#64d2ff",
                        "background-light": "#f6f8f8",
                        "background-dark": "#0f172a",
                    },
                    fontFamily: {
                        "display": ["Manrope"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1.25rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body { font-family: 'Manrope', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .bg-gradient-brand {
            background: linear-gradient(135deg, #1f96ad 0%, #64d2ff 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-[#121617] dark:text-white min-h-screen pb-24">
<header class="sticky top-0 z-50 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md px-4 pt-6 pb-4">
<div class="flex items-center justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-2xl">account_balance_wallet</span>
<h1 class="text-xl font-extrabold tracking-tight">reporte de caja</h1>
</div>
<div class="flex items-center gap-3">
<span class="text-xs font-bold text-primary tracking-tight">mensana</span>
<button class="bg-white dark:bg-slate-800 p-2 rounded-full shadow-sm border border-slate-100 dark:border-slate-700">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-300 text-xl">download</span>
</button>
</div>
</div>
</header>
<main class="max-w-md mx-auto px-4 space-y-6">
<section class="flex flex-col gap-3">
<div class="flex px-1 items-center justify-between">
<span class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">Periodo</span>
<button class="text-primary text-xs font-bold flex items-center gap-1">
                    Cambiar <span class="material-symbols-outlined text-sm">unfold_more</span>
</button>
</div>
<div class="flex gap-3 overflow-x-auto no-scrollbar pb-2">
<div class="flex-none bg-gradient-brand text-white px-5 py-4 rounded-2xl flex flex-col items-center min-w-[100px] shadow-lg shadow-primary/20">
<span class="text-[10px] opacity-80 uppercase font-bold tracking-wider">Oct</span>
<span class="text-lg font-bold">2023</span>
</div>
<div class="flex-none bg-white dark:bg-slate-800 text-slate-400 px-5 py-4 rounded-2xl flex flex-col items-center min-w-[100px] border border-slate-100 dark:border-slate-700">
<span class="text-[10px] uppercase font-bold tracking-wider">Sep</span>
<span class="text-lg font-bold">2023</span>
</div>
<div class="flex-none bg-white dark:bg-slate-800 text-slate-400 px-5 py-4 rounded-2xl flex flex-col items-center min-w-[100px] border border-slate-100 dark:border-slate-700">
<span class="text-[10px] uppercase font-bold tracking-wider">Ago</span>
<span class="text-lg font-bold">2023</span>
</div>
</div>
</section>
<section class="bg-white dark:bg-slate-900 p-6 rounded-3xl shadow-sm border border-slate-100 dark:border-slate-800">
<div class="flex justify-between items-start mb-4">
<div>
<p class="text-slate-500 text-sm font-medium">Ingresos Totales Acumulados</p>
<h2 class="text-4xl font-extrabold tracking-tight mt-1 text-slate-900 dark:text-white">$15.240,00</h2>
</div>
<div class="bg-primary/10 text-primary px-2.5 py-1.5 rounded-xl text-xs font-bold flex items-center gap-1">
<span class="material-symbols-outlined text-sm font-bold">trending_up</span>
                    +12.4%
                </div>
</div>
<div class="w-full h-32 mt-8 relative">
<svg class="w-full h-full" preserveAspectRatio="none" viewBox="0 0 400 100">
<defs>
<linearGradient id="chartGradient" x1="0" x2="0" y1="0" y2="1">
<stop offset="0%" stop-color="#1f96ad" stop-opacity="0.2"></stop>
<stop offset="100%" stop-color="#1f96ad" stop-opacity="0"></stop>
</linearGradient>
</defs>
<path d="M0,80 Q50,70 100,40 T200,60 T300,20 T400,30 L400,100 L0,100 Z" fill="url(#chartGradient)"></path>
<path d="M0,80 Q50,70 100,40 T200,60 T300,20 T400,30" fill="none" stroke="#1f96ad" stroke-linecap="round" stroke-width="4"></path>
<circle cx="100" cy="40" fill="#1f96ad" r="5"></circle>
<circle cx="300" cy="20" fill="#1f96ad" r="5"></circle>
</svg>
<div class="flex justify-between text-[10px] text-slate-400 font-bold mt-4 uppercase tracking-[0.1em]">
<span>Día 01</span>
<span>Día 15</span>
<span>Día 31</span>
</div>
</div>
</section>
<section class="space-y-4">
<h3 class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] px-1">Distribución de Pagos</h3>
<div class="grid grid-cols-3 gap-3">
<div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border border-slate-100 dark:border-slate-700">
<p class="text-[10px] font-bold text-slate-400 mb-2 uppercase">Efectivo</p>
<p class="text-xl font-extrabold text-slate-900 dark:text-white">45%</p>
<div class="w-full bg-slate-100 dark:bg-slate-700 h-1.5 rounded-full mt-3 overflow-hidden">
<div class="bg-primary h-full rounded-full" style="width: 45%"></div>
</div>
</div>
<div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border border-slate-100 dark:border-slate-700">
<p class="text-[10px] font-bold text-slate-400 mb-2 uppercase">Tarjeta</p>
<p class="text-xl font-extrabold text-slate-900 dark:text-white">30%</p>
<div class="w-full bg-slate-100 dark:bg-slate-700 h-1.5 rounded-full mt-3 overflow-hidden">
<div class="bg-accent h-full rounded-full" style="width: 30%"></div>
</div>
</div>
<div class="bg-white dark:bg-slate-800 p-4 rounded-2xl border border-slate-100 dark:border-slate-700">
<p class="text-[10px] font-bold text-slate-400 mb-2 uppercase">Transf.</p>
<p class="text-xl font-extrabold text-slate-900 dark:text-white">25%</p>
<div class="w-full bg-slate-100 dark:bg-slate-700 h-1.5 rounded-full mt-3 overflow-hidden">
<div class="bg-slate-300 dark:bg-slate-500 h-full rounded-full" style="width: 25%"></div>
</div>
</div>
</div>
</section>
<section class="grid grid-cols-2 gap-4">
<button class="bg-gradient-brand p-5 rounded-3xl text-left shadow-lg shadow-primary/20 flex flex-col items-start transition-transform active:scale-95">
<div class="bg-white/20 p-2 rounded-xl mb-3">
<span class="material-symbols-outlined text-white text-2xl">add_circle</span>
</div>
<p class="text-[10px] font-bold text-white/80 uppercase tracking-widest">Nueva Reserva</p>
<p class="text-sm font-extrabold text-white mt-1">Agendar Cita</p>
<span class="material-symbols-outlined text-white/50 text-lg mt-4 self-end">chevron_right</span>
</button>
<button class="bg-slate-900 dark:bg-slate-800 p-5 rounded-3xl text-left shadow-lg flex flex-col items-start border border-slate-800 dark:border-slate-700 transition-transform active:scale-95">
<div class="bg-primary/20 p-2 rounded-xl mb-3">
<span class="material-symbols-outlined text-primary text-2xl">calendar_today</span>
</div>
<p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Agenda Diaria</p>
<p class="text-sm font-extrabold text-white mt-1">Ver Calendario</p>
<span class="material-symbols-outlined text-slate-500 text-lg mt-4 self-end">chevron_right</span>
</button>
</section>
</main>
<nav class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl border-t border-slate-100 dark:border-slate-800 px-6 py-4 flex justify-between items-center z-50">
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined text-2xl">home</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Inicio</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined text-2xl">calendar_month</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Citas</span>
</button>
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined text-2xl font-variation-fill">bar_chart</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Caja</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined text-2xl">group</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Pacientes</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400">
<span class="material-symbols-outlined text-2xl">settings</span>
<span class="text-[10px] font-bold uppercase tracking-tighter">Ajustes</span>
</button>
</nav>
<div class="h-8 bg-white dark:bg-slate-900"></div>

</body></html>
