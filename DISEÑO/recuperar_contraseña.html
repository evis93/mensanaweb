<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#268FDB",
                        "background-light": "#f6f7f8",
                        "background-dark": "#121b20",
                        "sky-soft": "#99D6F7",
                        "celeste-pale": "#E6F5FD",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
        }
        .bg-gradient-wellness {
            background: linear-gradient(180deg, #99D6F7 0%, #E6F5FD 100%);
        }
        .soft-glow {
            box-shadow: 0 10px 40px -10px rgba(38, 143, 219, 0.15);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display">
<div class="relative flex min-h-screen w-full flex-col bg-gradient-wellness items-center justify-center p-4">
<!-- Main Content Block -->
<div class="w-full max-w-[440px] bg-white rounded-xl p-8 soft-glow flex flex-col items-center">
<!-- Logo Section -->
<div class="mb-10">
<h1 class="text-primary text-2xl font-bold tracking-tight lowercase">mensana</h1>
</div>
<!-- Header Section -->
<div class="text-center mb-8">
<h2 class="text-slate-900 text-2xl font-bold leading-tight mb-3 lowercase">recuperar contraseña</h2>
<p class="text-slate-500 text-base font-normal leading-relaxed lowercase">ingresa tu correo electrónico para recibir un enlace de recuperación</p>
</div>
<!-- Form Section -->
<form class="w-full space-y-6">
<div class="flex flex-col gap-2">
<label class="text-slate-600 text-sm font-medium px-1 lowercase">correo electrónico</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-primary/60 text-[20px]">mail</span>
<input class="w-full h-14 pl-12 pr-4 rounded-xl border border-primary/10 bg-celeste-pale/30 text-slate-900 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all placeholder:text-slate-400 lowercase" placeholder="ejemplo@correo.com" type="email"/>
</div>
</div>
<!-- Action Button -->
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white rounded-xl font-bold text-base tracking-wide transition-all soft-glow flex items-center justify-center gap-2 lowercase" type="submit">
                    enviar enlace
                    <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>
<!-- Decorative Illustration (Minimalist plant-like vector placeholder) -->
<div class="mt-12 mb-8 flex justify-center">
<div class="relative w-24 h-24 flex items-center justify-center">
<div class="absolute inset-0 bg-primary/5 rounded-full blur-2xl"></div>
<span class="material-symbols-outlined text-primary/40 text-[64px] relative">spa</span>
</div>
</div>
<!-- Footer Link -->
<div class="mt-4">
<a class="text-primary hover:text-primary/80 text-sm font-semibold transition-colors flex items-center gap-1 lowercase" href="#">
<span class="material-symbols-outlined text-[18px]">chevron_left</span>
                    volver al inicio de sesión
                </a>
</div>
</div>
<!-- Abstract Background Elements -->
<div class="fixed top-20 left-20 w-64 h-64 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed bottom-20 right-20 w-96 h-96 bg-primary/10 rounded-full blur-3xl -z-10"></div>
</div>
</body></html>
