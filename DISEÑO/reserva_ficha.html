<!DOCTYPE html>

<html lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#268FDB",
                        "accent-light": "#99D6F7",
                        "accent-pale": "#E6F5FD",
                        "background-light": "#f6f7f8",
                        "background-dark": "#121b20",
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            background: linear-gradient(to bottom, #99D6F7 0%, #E6F5FD 100%);
            min-height: 100vh;
        }
        .soft-glow {
            box-shadow: 0 4px 20px rgba(38, 143, 219, 0.08);
        }
        /* Lowercase brand directive */
        .brand-text {
            text-transform: lowercase;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="flex items-center justify-center p-4 sm:p-8">
<div class="w-full max-w-lg bg-white rounded-xl overflow-hidden soft-glow flex flex-col">
<!-- Header -->
<div class="flex items-center px-6 py-4 border-b border-accent-pale">
<button class="text-primary hover:bg-accent-pale p-2 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="flex-1 text-center brand-text font-bold text-slate-800 text-lg">cerrar sesión</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
<!-- Scrollable Content Area -->
<div class="p-6 space-y-8">
<!-- Appointment Summary -->
<section class="space-y-3">
<h2 class="brand-text font-semibold text-primary text-sm tracking-wide">resumen de la cita</h2>
<div class="flex items-center gap-4 bg-accent-pale/30 p-4 rounded-lg">
<div class="size-14 rounded-full bg-cover bg-center shrink-0 border-2 border-white" data-alt="foto de perfil del paciente de cerca" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCYZ4DyeGhzh_VJJb-BXaXt9_gaZvOV4HsG47c6oKDkOIR337BKWpvP33TUSFw6T3HibCxtvYsNTy69v9joxuYCueQuJ2tIyTvGyBWlfm6jtqAFYvqz8iKBUFsS6u9nCr_ANEZqeG22lr62rcSqmczheeUTya8PC85xnqWo5N0kkwDU91qnTt4xhTD1iR7hQzTWgtlALNqXpSpYNs6kXZx3ZMGGmIT-CGSO_1JL4K1mlnIzNaTqreKqkYNd0UaDvyk7c7KFeG4N2u4E')"></div>
<div class="flex flex-col">
<p class="brand-text text-slate-900 font-medium">paciente: laura méndez</p>
<p class="brand-text text-slate-500 text-sm">consulta de bienestar • 25 oct 2023</p>
</div>
</div>
</section>
<!-- Private Notes -->
<section class="space-y-3">
<h2 class="brand-text font-semibold text-primary text-sm tracking-wide">notas internas</h2>
<div class="relative">
<textarea class="w-full min-h-[160px] rounded-lg border-accent-pale bg-accent-pale/10 focus:ring-primary focus:border-primary p-4 brand-text text-slate-700 placeholder:text-slate-400" placeholder="escriba aquí las observaciones clínicas o notas privadas que no serán visibles para el cliente..."></textarea>
<div class="absolute bottom-3 right-3 text-slate-300 pointer-events-none">
<span class="material-symbols-outlined text-sm">lock</span>
</div>
</div>
</section>
<!-- Payment Details -->
<section class="space-y-4">
<h2 class="brand-text font-semibold text-primary text-sm tracking-wide">detalles del pago</h2>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="brand-text text-xs text-slate-500 ml-1">cobro realizado</label>
<div class="relative">
<span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">$</span>
<input class="w-full pl-7 pr-3 py-2.5 bg-accent-pale/10 border-accent-pale rounded-lg focus:ring-primary focus:border-primary brand-text text-slate-700" step="0.01" type="number" value="45.00"/>
</div>
</div>
<div class="space-y-2">
<label class="brand-text text-xs text-slate-500 ml-1">método de pago</label>
<select class="w-full px-3 py-2.5 bg-accent-pale/10 border-accent-pale rounded-lg focus:ring-primary focus:border-primary brand-text text-slate-700 appearance-none">
<option selected="" value="tarjeta">tarjeta</option>
<option value="efectivo">efectivo</option>
<option value="transferencia">transferencia</option>
</select>
</div>
</div>
</section>
</div>
<!-- Footer Action -->
<div class="p-6 pt-2 border-t border-accent-pale bg-accent-pale/5">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-primary/20 brand-text flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-lg">check_circle</span>
                finalizar y guardar
            </button>
<p class="brand-text text-center text-[10px] text-slate-400 mt-4 italic">esta información es confidencial y solo para uso profesional</p>
</div>
</div>
</body></html>
