<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&amp;family=Public+Sans:wght@100;400;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec5b13",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221610",
                        "mensana-blue": "#8ecae6",
                        "mensana-dark": "#219ebc"
                    },
                    fontFamily: {
                        "display": ["Quicksand", "sans-serif"],
                        "sans": ["Quicksand", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Quicksand', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex flex-col items-center justify-center p-4">
<div class="w-full max-w-lg bg-white dark:bg-slate-900 rounded-xl shadow-lg overflow-hidden border border-slate-200 dark:border-slate-800">
<!-- Header -->
<div class="flex items-center bg-white dark:bg-slate-900 p-4 border-b border-slate-100 dark:border-slate-800">
<div class="text-slate-600 dark:text-slate-300 flex size-10 shrink-0 items-center justify-center cursor-pointer hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-800 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight flex-1 text-center pr-10 font-display">dejar una reseña</h2>
</div>
<div class="p-6 md:p-8 flex flex-col items-center">
<!-- Title & Help Text -->
<h3 class="text-slate-900 dark:text-white tracking-tight text-2xl font-bold leading-tight text-center pb-2 font-display">dejar una reseña</h3>
<p class="text-slate-500 dark:text-slate-400 text-base font-normal leading-relaxed pb-8 text-center max-w-xs">
                tu opinión ayuda a otros consultantes y se compartirá en google reviews
            </p>
<!-- Star Selector -->
<div class="flex flex-col items-center gap-4 mb-8">
<div class="flex gap-2">
<button aria-label="1 star" class="text-mensana-blue hover:text-mensana-dark transition-colors">
<span class="material-symbols-outlined !text-5xl" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;">star</span>
</button>
<button aria-label="2 stars" class="text-mensana-blue hover:text-mensana-dark transition-colors">
<span class="material-symbols-outlined !text-5xl" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;">star</span>
</button>
<button aria-label="3 stars" class="text-mensana-blue hover:text-mensana-dark transition-colors">
<span class="material-symbols-outlined !text-5xl" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;">star</span>
</button>
<button aria-label="4 stars" class="text-mensana-blue hover:text-mensana-dark transition-colors">
<span class="material-symbols-outlined !text-5xl" style="font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;">star</span>
</button>
<button aria-label="5 stars" class="text-slate-200 dark:text-slate-700 hover:text-mensana-blue transition-colors">
<span class="material-symbols-outlined !text-5xl" style="font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;">star</span>
</button>
</div>
<span class="text-sm font-medium text-slate-400 dark:text-slate-500">toca para calificar</span>
</div>
<!-- Review Textarea -->
<div class="w-full flex flex-col gap-2 mb-8">
<label class="text-slate-700 dark:text-slate-200 text-sm font-semibold ml-1">Tu experiencia</label>
<textarea class="form-input flex w-full min-w-0 resize-none overflow-hidden rounded-lg text-slate-800 dark:text-slate-100 focus:outline-0 focus:ring-2 focus:ring-mensana-blue border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 placeholder:text-slate-400 dark:placeholder:text-slate-500 min-h-[160px] p-4 text-base font-normal leading-normal transition-all" placeholder="cuéntanos tu experiencia..."></textarea>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 px-6 rounded-lg shadow-md transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span>publicar reseña</span>
<span class="material-symbols-outlined text-xl">send</span>
</button>
<!-- Branding Subtle -->
<div class="mt-8 flex items-center gap-2 opacity-50">
<div class="w-6 h-6 bg-mensana-blue rounded-full flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xs">psychology</span>
</div>
<span class="text-xs font-bold tracking-widest uppercase text-slate-400">mensana</span>
</div>
</div>
</div>
<!-- Background Decoration -->
<div class="fixed top-0 left-0 w-full h-full -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-mensana-blue/10 blur-[100px]"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/5 blur-[100px]"></div>
</div>
</body></html>
