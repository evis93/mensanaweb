<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Acceso con Biometría Profesionales</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#2b8bab",
              "background-light": "#f9fafa",
              "background-dark": "#1a1d21",
            },
            fontFamily: {
              "display": ["Manrope", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      body { font-family: 'Manrope', sans-serif; }
      .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-[#121617] dark:text-white transition-colors duration-200">
<div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden max-w-[430px] mx-auto bg-background-light dark:bg-background-dark shadow-2xl">
<!-- Top App Bar (iOS Style) -->
<header class="flex items-center px-4 pt-6 pb-2 justify-between sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-10">
<button class="flex size-10 items-center justify-center rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back_ios_new</span>
</button>

</header>
<main class="flex-1 flex flex-col px-6">
<!-- Branding/Logo Section -->
<div class="flex flex-col items-center pt-8 pb-4">
<div class="w-16 h-16 bg-primary/10 dark:bg-primary/20 rounded-2xl flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-4xl">medical_services</span>
</div>
<h1 class="text-[#121617] dark:text-white text-[28px] font-bold leading-tight text-center">¡Bienvenido!</h1>
<p class="text-[#677c83] dark:text-gray-400 text-base font-normal leading-normal pt-2 text-center">
                    Ingresa tus credenciales para gestionar tu consultorio
                </p>
</div>
<!-- Login Form -->
<div class="mt-8 space-y-4">
<!-- User Field -->
<div class="flex flex-col w-full">
<label class="text-[#121617] dark:text-gray-200 text-sm font-medium leading-normal pb-1.5 ml-1">Usuario</label>
<input class="flex w-full rounded-xl text-[#121617] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dde2e4] dark:border-gray-700 bg-white dark:bg-gray-800 h-14 placeholder:text-[#677c83] px-4 text-base font-normal" placeholder="nombre@clinica.com" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col w-full">
<div class="flex justify-between items-center pb-1.5 ml-1">
<label class="text-[#121617] dark:text-gray-200 text-sm font-medium">Contraseña</label>
<a class="text-primary text-xs font-semibold" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative flex w-full items-center">
<input class="flex w-full rounded-xl text-[#121617] dark:text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-[#dde2e4] dark:border-gray-700 bg-white dark:bg-gray-800 h-14 placeholder:text-[#677c83] px-4 text-base font-normal pr-12" placeholder="••••••••" type="password"/>
<button class="absolute right-4 text-[#677c83] hover:text-primary transition-colors">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Remember Me Toggle -->
<div class="flex items-center gap-2 py-2 ml-1">
<input class="w-5 h-5 rounded border-gray-300 text-primary focus:ring-primary" type="checkbox"/>
<span class="text-sm text-[#677c83] dark:text-gray-400">Recordar sesión</span>
</div>
<!-- Action Buttons -->
<div class="pt-4 space-y-4">
<!-- Primary Login -->
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
                        Iniciar Sesión
                    </button>
<!-- Divider -->
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-1 bg-gray-200 dark:bg-gray-700"></div>
<span class="text-xs font-bold text-gray-400 uppercase tracking-widest">o accede con</span>
<div class="h-[1px] flex-1 bg-gray-200 dark:bg-gray-700"></div>
</div>
<!-- Biometric Button (Alternative Primary) -->
<button class="w-full border-2 border-primary/30 hover:bg-primary/5 dark:hover:bg-primary/10 text-primary font-bold py-4 rounded-xl flex items-center justify-center gap-3 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-2xl">fingerprint</span>
                        Acceso Biométrico
                    </button>
</div>
</div>
<!-- FaceID Hint / Visual Graphic -->
<div class="mt-12 mb-8 flex flex-col items-center justify-center opacity-40">
<span class="material-symbols-outlined text-5xl mb-2">face</span>
<p class="text-[10px] uppercase font-bold tracking-[0.2em] text-center">Compatible con FaceID y Huella Digital</p>
</div>
</main>
<!-- Footer -->
<footer class="p-6 text-center border-t border-gray-100 dark:border-gray-800">
<p class="text-sm text-[#677c83] dark:text-gray-400">
                ¿No tienes una cuenta profesional? 
                <a class="text-primary font-bold ml-1" href="#">Contactar Soporte</a>
</p>
</footer>
<!-- iOS Indicator Bar -->
<div class="h-1.5 w-32 bg-gray-300 dark:bg-gray-700 rounded-full mx-auto mb-2 mt-4"></div>
</div>
</body></html>
